<!DOCTYPE html>
<html>
<head>
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1><i><b>MY GALLERY</b></i></h1>

<div class="gallery">

    <img src="./media/i5.jpg" onclick="openImage(2)">
    <img src="./media/i1.jpg" onclick="openImage(1)">
    <img src="./media/i8.jpg" onclick="openImage(2)">

    <img src="./media/i3.webp" onclick="openImage(3)">
    <img src="./media/i8.jpg" onclick="openImage(4)">
    <img src="./media/i4.webp" onclick="openImage(5)">

</div>

<div class="lightbox" id="lightbox">

    <span class="close" onclick="closeImage()">&times;</span>

    <button class="prev" onclick="previousImage()">❮</button>

    <img id="lightbox-img">

    <button class="next" onclick="nextImage()">❯</button>

</div>

<script src="script.js"></script>

</body>
</html>
